<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九骰旗艦系統 v6.3 視覺全強化版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #facc15;
            --hot: #f97316; --ultra: #ff00ea;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; margin-top: 12px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        .dice-btn { width: 42px; height: 42px; font-size: 18px; margin: 2px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; cursor: pointer; }
        
        .prob { font-size: 38px; font-weight: 800; font-family: 'Courier New'; margin: 2px 0; color: white; }
        .level-ultra { color: var(--ultra); animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }

        .ratio-box { display: flex; align-items: center; gap: 8px; margin-top: 5px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; }
        .ratio-bar { flex-grow: 1; height: 12px; background: var(--primary); border-radius: 6px; overflow: hidden; display: flex; flex-direction: row-reverse; }
        .ratio-fill { height: 100%; background: var(--danger); transition: 0.5s; }

        .stake-adv { font-size: 18px; font-weight: bold; padding: 5px 15px; border-radius: 20px; margin-top: 5px; display: inline-block; border: 2px solid transparent; }
        .stake-wait { color: #94a3b8; border-color: #475569; }
        .stake-low { color: var(--success); border-color: var(--success); }
        .stake-mid { color: var(--warning); border-color: var(--warning); }
        .stake-high { color: var(--ultra); border-color: var(--ultra); animation: blink 0.8s infinite alternate; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: center; border-bottom: 1px solid #334155; font-size: 13px; }
        .pred-box { font-size: 22px; font-weight: bold; border-radius: 4px; padding: 4px 8px; }
        .big { color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .small { color: var(--primary); background: rgba(59, 130, 246, 0.1); }

        .dot-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .dot-label { font-size: 12px; color: #94a3b8; width: 50px; flex-shrink: 0; }
        .dot-container { display: flex; flex-wrap: wrap; gap: 3px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.win { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .dot.lose { background: var(--danger); }
        
        .road-msg { background: #020617; padding: 12px; border-radius: 8px; color: #10b981; font-family: monospace; font-size: 14px; min-height: 40px; border-left: 4px solid var(--success); }
        
        /* 歷史紀錄標籤顏色 */
        .history-tag { display: inline-block; background: #334155; padding: 4px 8px; border-radius: 6px; margin: 3px; font-size: 13px; font-family: monospace; }
        .tag-big { border-left: 4px solid var(--danger); }
        .tag-small { border-left: 4px solid var(--primary); }
        .text-big { color: var(--danger); font-weight: bold; }
        .text-small { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header><h2>🎲 九骰旗艦 v6.3 <span style="font-size: 12px; color:var(--success)">● 視覺全回歸優化版</span></h2></header>

    <div class="card">
        <div id="diceButtons"></div>
        <div style="margin-top:8px;">
            選取：<span id="selectedDice" style="color:var(--warning); font-weight:bold;">-</span> 
            <button onclick="app.submitRound()" style="background:var(--success); color:white; border:none; padding:8px 25px; border-radius:6px; cursor:pointer; font-weight:bold; margin-left:15px;">確認送出</button>
            <button onclick="app.deleteLast()" style="background:#475569; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; margin-left:8px;">撤銷</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>⚠️ 監控核心</h3>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div id="specialProb" class="prob">0.00%</div>
                    <div id="patternStatus" style="color:var(--warning); font-size:12px; font-weight:bold;">系統就緒</div>
                </div>
                <div style="text-align: right; width: 55%;">
                    <div style="font-size: 11px; color:#94a3b8;">大小佔比 (近50局)</div>
                    <div class="ratio-box">
                        <span style="font-size:12px; color:var(--primary); font-weight:bold;">小</span>
                        <div class="ratio-bar"><div id="ratioFill" class="ratio-fill" style="width: 50%;"></div></div>
                        <span style="font-size:12px; color:var(--danger); font-weight:bold;">大</span>
                    </div>
                    <div id="ratioText" style="font-size:12px; color:white; font-weight:bold; margin-top:5px;">50% : 50%</div>
                </div>
            </div>
            <p id="gapInfo" style="font-size:12px; color:#94a3b8; margin-top:8px;"></p>
        </div>

        <div class="card">
            <h3>📊 雙模勝率統計</h3>
            <table>
                <tr><th>模式</th><th>下一局</th><th>20局</th><th>100局</th></tr>
                <tr>
                    <td>🛡️ 保守</td>
                    <td id="nextCons" class="pred-box">-</td>
                    <td id="accCons20" style="color:var(--success)">-</td>
                    <td id="accCons100">-</td>
                </tr>
                <tr>
                    <td>🔥 高頻</td>
                    <td id="nextAggr" class="pred-box">-</td>
                    <td id="accAggr20" style="color:var(--success)">-</td>
                    <td id="accAggr100">-</td>
                </tr>
            </table>
            <div style="margin-top:10px; text-align: center;">
                <div id="confStars" style="color:var(--warning); margin-bottom:5px; height: 18px;"></div>
                <div id="stakeAdv" class="stake-adv stake-wait">等待數據</div>
            </div>
        </div>

        <div class="card">
            <h3>📈 規律與燈號</h3>
            <div id="roadAdvice" class="road-msg">請輸入數據...</div>
            <div class="dot-row">
                <span class="dot-label">🛡️ 保守</span>
                <div id="dotsCons" class="dot-container"></div>
            </div>
            <div class="dot-row">
                <span class="dot-label">🔥 高頻</span>
                <div id="dotsAggr" class="dot-container"></div>
            </div>
        </div>
    </div>

    <div class="card"><div id="chart" style="height:200px;"></div></div>
    <div class="card"><h3>歷史記錄 (近 30 局)</h3><div id="historyList"></div></div>
</div>

<script>
const app = {
    data: { rounds: [], selected: [], probs: [], predsCons: [], predsAggr: [], intervals: [], lastSpecial: null },
    init() { this.renderBtns(); this.chart = echarts.init(document.getElementById('chart')); this.updateChart(); },
    renderBtns() {
        const c = document.getElementById("diceButtons");
        for(let i=1; i<=6; i++) {
            const b = document.createElement("button"); b.innerText = i; b.className = "dice-btn";
            b.onclick = () => { if(this.data.selected.length < 3) { this.data.selected.push(i); document.getElementById("selectedDice").innerText = this.data.selected.join(","); } };
            c.appendChild(b);
        }
    },
    submitRound() {
        if(this.data.selected.length !== 3) return;
        const dice = [...this.data.selected]; const sum = dice.reduce((a,b)=>a+b,0);
        const isSpec = (dice[0]===dice[1] && dice[1]===dice[2]) || sum === 17;
        this.data.rounds.push({ dice, sum, isSpec, size: sum >= 11 ? "大" : "小" });
        if(isSpec) {
            if(this.data.lastSpecial !== null) this.data.intervals.push(this.data.rounds.length - 1 - this.data.lastSpecial);
            this.data.lastSpecial = this.data.rounds.length - 1;
        }
        this.data.selected = []; document.getElementById("selectedDice").innerText = "-"; this.calculate();
    },
    calculate() { this.calcSpecialProb(); this.analyzePatterns(); this.refreshUI(); },

    calcSpecialProb() {
        const rounds = this.data.rounds; const total = rounds.length;
        const gap = this.data.lastSpecial === null ? total : total - 1 - this.data.lastSpecial;
        let weight = 1.0; weight += Math.exp(-Math.pow(gap - 8, 2) / 10); if(gap > 15) weight += (gap-15)*0.1;
        let patternBonus = 1.0; let patternDesc = "";
        if(total >= 3) {
            const all9 = rounds.slice(-3).flatMap(r => r.dice);
            const counts = {}; all9.forEach(n => counts[n] = (counts[n] || 0) + 1);
            const freq = Object.values(counts).sort((a,b)=>b-a);
            if(freq[0]>=4 && freq[1]>=4) { patternBonus = 2.5; patternDesc = "🔥 極致特徵"; }
            else if(freq[0]>=3 && freq[1]>=3) { patternBonus = 1.8; patternDesc = "⭐ 密集升溫"; }
        }
        const finalProb = Math.min(4.17 * weight * patternBonus, 20.0);
        this.data.probs.push(finalProb.toFixed(2));
        const el = document.getElementById("specialProb");
        el.innerText = finalProb.toFixed(2) + "%";
        el.className = "prob" + (finalProb >= 15 ? " level-ultra" : "");
        document.getElementById("patternStatus").innerText = patternDesc || "規律掃描中";
        document.getElementById("gapInfo").innerText = `間隔：${gap} | 歷史：${[...this.data.intervals].reverse().slice(0,3).join(",")}`;

        const last50 = rounds.slice(-50);
        const bigCount = last50.filter(r => r.size === "大").length;
        const bigRate = last50.length === 0 ? 50 : Math.round((bigCount / last50.length) * 100);
        document.getElementById("ratioFill").style.width = bigRate + "%";
        document.getElementById("ratioText").innerText = `${100-bigRate}% (小) : ${bigRate}% (大)`;
    },

    analyzePatterns() {
        const rounds = this.data.rounds; const total = rounds.length; if(total === 0) return;
        const sizes = rounds.map(r => r.size); const last = sizes[total-1];
        this.data.predsCons.push(last);
        let nextAggr = last; let msg = "分析中..."; let stars = 2;
        const s = sizes.slice(-12).join("");
        let streak = 0; for(let i=total-1; i>=0; i--) { if(sizes[i] === last) streak++; else break; }

        const isSpec_12_Extended = s.endsWith("大小小大小小") || s.endsWith("小大大小大大");
        const isSpec_12_Restart = s.endsWith("大小大大小") || s.endsWith("小大小小大");
        const is13Pattern = (s.endsWith("大小小小") || s.endsWith("小大大大"));

        if(streak >= 3 && !is13Pattern && !isSpec_12_Extended) {
            msg = `【長龍】${last} 連開 ${streak}`; nextAggr = streak >= 6 ? (last === "大" ? "小" : "大") : last; stars = 4;
        } else if (isSpec_12_Extended || isSpec_12_Restart) {
            nextAggr = s.endsWith("小") ? "大" : "小"; msg = `【1-2規律】鎖定重啟`; stars = 5;
        } else if (is13Pattern) {
            nextAggr = s.endsWith("小") ? "大" : "小"; msg = `【1-3循環】達成`; stars = 5;
        } else if (s.endsWith("大小小") || s.endsWith("小大大")) {
            nextAggr = s.endsWith("小") ? "大" : "小"; msg = `【1-2規律】完成`; stars = 4;
        } else if (s.endsWith("大小大小") || s.endsWith("小大小大")) {
            nextAggr = last === "大" ? "小" : "大"; msg = `【單跳】持續中`; stars = 4;
        } else { nextAggr = last; stars = 2; }

        this.data.predsAggr.push(nextAggr);
        document.getElementById("roadAdvice").innerText = msg;
        document.getElementById("confStars").innerText = "⭐".repeat(stars);

        const lastWin = this.data.predsAggr.length > 1 ? (this.data.predsAggr[total-2] === rounds[total-1].size) : false;
        const stakeEl = document.getElementById("stakeAdv");
        stakeEl.className = "stake-adv"; 
        if (stars === 5 && lastWin) { stakeEl.innerText = "💰 重注鎖定"; stakeEl.classList.add("stake-high"); }
        else if (stars >= 4 && lastWin) { stakeEl.innerText = "🔥 中注跟進"; stakeEl.classList.add("stake-mid"); }
        else if (stars >= 3) { stakeEl.innerText = "🛡️ 輕注觀望"; stakeEl.classList.add("stake-low"); }
        else { stakeEl.innerText = "💤 休息一局"; stakeEl.classList.add("stake-wait"); }
    },

    refreshUI() {
        const rounds = this.data.rounds; const total = rounds.length; if(total === 0) return;
        const cP = this.data.predsCons[total-1]; const aP = this.data.predsAggr[total-1];
        document.getElementById("nextCons").innerText = cP; document.getElementById("nextCons").className = `pred-box ${cP === '大' ? 'big' : 'small'}`;
        document.getElementById("nextAggr").innerText = aP; document.getElementById("nextAggr").className = `pred-box ${aP === '大' ? 'big' : 'small'}`;
        
        const renderData = (acc20Id, acc100Id, dotId, predArr) => {
            let win20 = 0, win100 = 0, dotsHtml = "";
            for(let i = 1; i < total; i++) {
                const isWin = (predArr[i-1] === rounds[i].size);
                if(i >= total - 20) { if(isWin) win20++; }
                if(i >= total - 100) { if(isWin) win100++; }
                if(i >= total - 20) dotsHtml = `<div class="dot ${isWin?'win':'lose'}"></div>` + dotsHtml;
            }
            document.getElementById(acc20Id).innerText = total < 2 ? "-" : (win20 / Math.min(total-1, 20) * 100).toFixed(1) + "%";
            document.getElementById(acc100Id).innerText = total < 2 ? "-" : (win100 / Math.min(total-1, 100) * 100).toFixed(1) + "%";
            document.getElementById(dotId).innerHTML = dotsHtml;
        };
        renderData("accCons20", "accCons100", "dotsCons", this.data.predsCons);
        renderData("accAggr20", "accAggr100", "dotsAggr", this.data.predsAggr);
        
        // 歷史紀錄顏色回歸修正
        document.getElementById("historyList").innerHTML = rounds.slice(-30).reverse().map(r => {
            const sizeClass = r.size === '大' ? 'tag-big' : 'tag-small';
            const textClass = r.size === '大' ? 'text-big' : 'text-small';
            return `<span class="history-tag ${sizeClass}">${r.dice.join("")} <b class="${textClass}">${r.size}</b> ${r.isSpec ? '⭐' : ''}</span>`;
        }).join("");
        
        this.updateChart();
    },
    updateChart() {
        this.chart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: this.data.probs.map((_, i) => i + 1), name: '局' },
            yAxis: { type: 'value', max: 20 },
            series: [{ data: this.data.probs, type: 'line', smooth: true, color: '#3b82f6', areaStyle: { opacity: 0.1 } }]
        });
    },
    deleteLast() { if(this.data.rounds.length === 0) return; this.data.rounds.pop(); this.data.probs.pop(); this.data.predsCons.pop(); this.data.predsAggr.pop(); this.calculate(); }
};
app.init();
</script>
</body>
</html>
