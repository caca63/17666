<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九骰旗艦系統 v7.3 豹子歸位版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #facc15;
            --hot: #f97316; --ultra: #ff00ea;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; margin-top: 12px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        .dice-btn { width: 44px; height: 44px; font-size: 20px; margin: 3px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; cursor: pointer; }
        .dice-btn:hover { background: var(--primary); }
        .prob { font-size: 42px; font-weight: 800; font-family: 'Courier New'; color: white; line-height: 1; transition: 0.3s; }
        
        .ratio-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; margin-top: 5px; }
        .ratio-bar { flex-grow: 1; height: 14px; background: var(--primary); border-radius: 7px; overflow: hidden; display: flex; flex-direction: row-reverse; }
        .ratio-fill { height: 100%; background: var(--danger); transition: 0.5s; }
        
        .volatility-bar { width: 100%; height: 10px; background: #334155; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .volatility-fill { height: 100%; transition: 0.5s; }

        .stake-adv { font-size: 20px; font-weight: bold; padding: 6px 20px; border-radius: 20px; margin-top: 5px; display: inline-block; border: 2px solid transparent; min-width: 160px; }
        .stake-high { color: var(--ultra); border-color: var(--ultra); animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; text-shadow: 0 0 10px var(--ultra); } to { opacity: 0.5; } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #334155; font-size: 14px; }
        .pred-box { font-size: 24px; font-weight: bold; border-radius: 6px; padding: 5px 10px; }
        .big { color: var(--danger); background: rgba(239, 68, 68, 0.15); }
        .small { color: var(--primary); background: rgba(59, 130, 246, 0.15); }
        .history-tag { display: inline-block; background: #334155; padding: 5px 10px; border-radius: 6px; margin: 4px; font-size: 14px; border-left: 5px solid transparent; }
        .tag-big { border-left-color: var(--danger); }
        .tag-small { border-left-color: var(--primary); }

        .top-settings { display: flex; justify-content: space-between; align-items: center; background: #020617; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .input-sm { background: #1e293b; border: 1px solid #475569; color: white; padding: 4px 8px; border-radius: 4px; width: 70px; text-align: center; font-weight: bold; }

        .dot-container { display: flex; flex-wrap: wrap; gap: 3px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.win { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .dot.lose { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <header><h2>🎲 九骰旗艦系統 v7.3 <span style="font-size: 12px; color:var(--ultra)">● 豹子機率原味歸位版</span></h2></header>

    <div class="top-settings">
        <div>
            <span style="color:#94a3b8; font-size:13px;">初始本金:</span> 
            <input type="number" id="baseBankroll" value="10000" class="input-sm" onchange="app.resetBankroll()">
            <span style="color:#94a3b8; font-size:13px; margin-left:10px;">基碼(1注):</span> 
            <input type="number" id="baseStake" value="100" class="input-sm">
        </div>
        <div style="font-size:18px; font-weight:bold;">
            模擬資金：<span id="currentBankroll" style="color:var(--success); font-size:22px;">10000</span>
        </div>
        <div style="display:flex; gap:15px; font-size:13px; color:#94a3b8;">
            <label><input type="checkbox" id="autoSimToggle" checked> 自動模擬配注</label>
            <label><input type="checkbox" id="soundToggle" checked> 🔔 音效</label>
        </div>
    </div>

    <div class="card">
        <div id="diceButtons"></div>
        <div style="margin-top:10px;">
            選取：<span id="selectedDice" style="color:var(--warning); font-weight:bold; font-size:22px;">-</span> 
            <button onclick="app.submitRound()" style="background:var(--success); color:white; border:none; padding:10px 30px; border-radius:8px; cursor:pointer; font-weight:bold; margin-left:20px;">確認送出</button>
            <button onclick="app.deleteLast()" style="background:#475569; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; margin-left:10px;">撤銷</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>⚠️ 豹子監控 (v5.5 原味版)</h3>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div id="specialProb" class="prob">0.00%</div>
                    <div id="gapDisplay" style="color:var(--warning); font-size:14px; font-weight:bold; margin-top:5px;">未開間隔：0局</div>
                </div>
                <div style="text-align: right; width: 55%;">
                    <div id="patternStatus" style="font-size:12px; margin-bottom:5px; font-weight:bold; color:var(--warning);">掃描中...</div>
                    <div class="ratio-box">
                        <span style="font-size:12px; color:var(--primary); font-weight:bold;">小</span>
                        <div class="ratio-bar"><div id="ratioFill" class="ratio-fill" style="width: 50%;"></div></div>
                        <span style="font-size:12px; color:var(--danger); font-weight:bold;">大</span>
                    </div>
                    <div id="ratioText" style="font-size:12px; color:white; font-weight:bold; margin-top:5px;">50% : 50%</div>
                </div>
            </div>
            <div id="historyIntervals" style="font-size:11px; color:#94a3b8; margin-top:10px; border-top:1px solid #334155; padding-top:5px;">歷史間隔：-</div>
        </div>

        <div class="card">
            <h3>📊 戰術預測</h3>
            <table>
                <tr><th>模式</th><th>下一局</th><th>20局勝率</th><th>100局勝率</th></tr>
                <tr><td>🌐 趨勢</td><td id="nextTrend" class="pred-box">-</td><td id="accTrend20">-</td><td id="accTrend100">-</td></tr>
                <tr><td>🔥 規律</td><td id="nextAggr" class="pred-box">-</td><td id="accAggr20">-</td><td id="accAggr100">-</td></tr>
            </table>
            <div style="text-align: center;">
                <div id="confStars" style="color:var(--warning); margin-top:5px; font-size:14px; height:18px;"></div>
                <div id="stakeAdv" class="stake-adv">等待數據</div>
            </div>
        </div>

        <div class="card">
            <h3>📈 狀態與下三路指示</h3>
            <div id="roadAdvice" style="background:#020617; padding:12px; border-radius:8px; color:#10b981; font-family:monospace; min-height:45px; border-left:4px solid var(--success); margin-bottom:10px;">掃描中...</div>
            
            <div style="font-size:12px; color:#94a3b8; margin-bottom:3px; display:flex; justify-content:space-between;">
                <span>下三路/震盪指數 (近10局)</span>
                <span id="volatilityText" style="font-weight:bold;">等待成型...</span>
            </div>
            <div class="volatility-bar"><div id="volatilityFill" class="volatility-fill" style="width: 0%;"></div></div>

            <div style="display:flex; flex-direction:column; gap:8px; margin-top:10px;">
                <div style="display:flex; align-items:center; gap:10px;"><span style="width:40px; font-size:11px; color:#94a3b8;">🌐 趨勢</span><div id="dotsTrend" class="dot-container"></div></div>
                <div style="display:flex; align-items:center; gap:10px;"><span style="width:40px; font-size:11px; color:#94a3b8;">🔥 規律</span><div id="dotsAggr" class="dot-container"></div></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>🚀 豹子機率流動 (300px)</h3>
        <div id="chart" style="height:300px;"></div>
    </div>

    <div class="card"><div id="historyList"></div></div>
</div>

<script>
let audioCtx = null;
function playSound(type) {
    if (!document.getElementById('soundToggle').checked) return;
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'ultra') { 
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'heavyStake') { 
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1046, audioCtx.currentTime);
            osc.frequency.setValueAtTime(1318, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    } catch(e) { console.log("Audio exception", e); }
}

const app = {
    data: { 
        rounds: [], selected: [], probs: [], predsTrend: [], predsAggr: [], intervals: [], lastSpecial: null,
        bankroll: 10000, currentBetAmount: 0 
    },
    init() { 
        this.resetBankroll();
        this.renderBtns(); 
        this.chart = echarts.init(document.getElementById('chart')); 
        window.onresize = () => this.chart.resize(); 
        this.updateChart(); 
    },
    resetBankroll() {
        this.data.bankroll = parseFloat(document.getElementById('baseBankroll').value) || 10000;
        document.getElementById('currentBankroll').innerText = this.data.bankroll;
    },
    renderBtns() {
        const c = document.getElementById("diceButtons");
        for(let i=1; i<=6; i++) {
            const b = document.createElement("button"); b.innerText = i; b.className = "dice-btn";
            b.onclick = () => { if(this.data.selected.length < 3) { this.data.selected.push(i); document.getElementById("selectedDice").innerText = this.data.selected.join(","); } };
            c.appendChild(b);
        }
    },
    submitRound() {
        if(this.data.selected.length !== 3) return;
        const dice = [...this.data.selected]; const sum = dice.reduce((a,b)=>a+b,0);
        const isSpec = (dice[0]===dice[1] && dice[1]===dice[2]) || sum === 17;
        const actualSize = sum >= 11 ? "大" : "小";
        
        let isWin = false;
        let betAmount = this.data.currentBetAmount;
        if (this.data.predsAggr.length > 0) {
            const lastPred = this.data.predsAggr[this.data.predsAggr.length - 1];
            isWin = (lastPred === actualSize);
            if (document.getElementById('autoSimToggle').checked && betAmount > 0) {
                if (isWin) this.data.bankroll += betAmount; 
                else this.data.bankroll -= betAmount; 
            }
        }

        this.data.rounds.push({ dice, sum, isSpec, size: actualSize, betAmount: betAmount, isWin: isWin });
        
        if(isSpec) {
            if(this.data.lastSpecial !== null) this.data.intervals.push(this.data.rounds.length - 1 - this.data.lastSpecial);
            this.data.lastSpecial = this.data.rounds.length - 1;
        }
        
        this.data.selected = []; document.getElementById("selectedDice").innerText = "-"; 
        
        const brEl = document.getElementById('currentBankroll');
        brEl.innerText = Math.floor(this.data.bankroll);
        brEl.style.color = this.data.bankroll >= parseFloat(document.getElementById('baseBankroll').value) ? "var(--success)" : "var(--danger)";

        this.calculate();
    },
    
    calculate() { this.calcSpecialProb(); this.analyzeTrend(); this.analyzeAggr(); this.refreshUI(); },

    // 💡 真正還原 v5.5 豹子算法：近 3 局 9 顆骰子偵測
    calcSpecialProb() {
        const rounds = this.data.rounds; const total = rounds.length;
        const gap = this.data.lastSpecial === null ? total : total - 1 - this.data.lastSpecial;
        let weight = 1.0; 
        weight += Math.exp(-Math.pow(gap - 8, 2) / 10); 
        if(gap > 15) weight += (gap-15)*0.1;
        
        let patternBonus = 1.0; let patternDesc = "";
        
        // 核心歸位：掃描近 3 局
        if(total >= 3) {
            const all9 = rounds.slice(-3).flatMap(r => r.dice);
            const counts = {}; all9.forEach(n => counts[n] = (counts[n] || 0) + 1);
            const freq = Object.values(counts).sort((a,b)=>b-a);
            
            // v5.5 經典條件
            if(freq[0] >= 4 && freq[1] >= 4) { 
                patternBonus = 2.5; patternDesc = "🔥 4同+4同 特徵！"; 
            }
            else if(freq[0] >= 3 && freq[1] >= 3) { 
                patternBonus = 1.8; patternDesc = "⭐ 號碼高度密集"; 
            }
        }

        const finalProb = Math.min(4.17 * weight * patternBonus, 20.0);
        this.data.probs.push(finalProb.toFixed(2));
        
        document.getElementById("specialProb").innerText = finalProb.toFixed(2) + "%";
        document.getElementById("patternStatus").innerText = patternDesc || "監控中...";
        
        if (finalProb >= 15) {
            document.getElementById("specialProb").className = "prob level-ultra";
            document.getElementById("patternStatus").style.color = "var(--ultra)";
            playSound('ultra'); 
        } else {
            document.getElementById("specialProb").className = "prob";
            document.getElementById("specialProb").style.color = finalProb > 12 ? "var(--hot)" : "white";
            document.getElementById("patternStatus").style.color = "var(--warning)";
        }
        
        document.getElementById("gapDisplay").innerText = `未開間隔：${gap} 局`;
        document.getElementById("historyIntervals").innerText = "歷史間隔：" + [...this.data.intervals].reverse().slice(0,5).join(", ");
        
        const last50 = rounds.slice(-50);
        const bigCount = last50.filter(r => r.size === "大").length;
        const bigRate = last50.length === 0 ? 50 : Math.round((bigCount / last50.length) * 100);
        document.getElementById("ratioFill").style.width = bigRate + "%";
        document.getElementById("ratioText").innerText = `${100-bigRate}% (小) : ${bigRate}% (大)`;
    },

    analyzeTrend() {
        const rounds = this.data.rounds; const total = rounds.length; if(total === 0) return;
        const last20 = rounds.slice(-20).map(r => r.size);
        const bigRate = last20.filter(s => s === "大").length / (last20.length || 1);
        let pred = rounds[total-1].size;
        if (bigRate >= 0.60) pred = "小"; else if (bigRate <= 0.40) pred = "大"; 
        this.data.predsTrend.push(pred);
    },

    analyzeAggr() {
        const rounds = this.data.rounds; const total = rounds.length; if(total === 0) return;
        const sizes = rounds.map(r => r.size); const last = sizes[total-1];
        let nextAggr = last; let msg = "掃描中..."; let stars = 2;
        const s = sizes.slice(-12).join("");
        let streak = 0; for(let i=total-1; i>=0; i--) { if(sizes[i] === last) streak++; else break; }

        if (s.endsWith("小大大")) { nextAggr = "小"; msg = "【1-2】完結：預期換向"; stars = 5; }
        else if (s.endsWith("大小小")) { nextAggr = "大"; msg = "【1-2】完結：預期換向"; stars = 5; }
        else if (s.endsWith("小大") && sizes[total-3] === "小") { nextAggr = "大"; msg = "【1-2】規律：補位點"; stars = 4; }
        else if (s.endsWith("大小") && sizes[total-3] === "大") { nextAggr = "小"; msg = "【1-2】規律：補位點"; stars = 4; }
        else if (s.endsWith("大小大小") || s.endsWith("小大小大")) { nextAggr = (last === "大" ? "小" : "大"); msg = "【單跳】規律持續"; stars = 4; }
        else if (streak >= 3) {
            nextAggr = (streak >= 6) ? (last === "大" ? "小" : "大") : last;
            msg = (streak >= 6) ? "【長龍】斷龍警報" : `【長龍】跟隨第 ${streak} 局`; stars = streak >= 6 ? 5 : 3;
        } else { nextAggr = last; stars = 2; }

        this.data.predsAggr.push(nextAggr);
        document.getElementById("roadAdvice").innerText = msg;
        document.getElementById("confStars").innerText = "⭐".repeat(stars);

        const baseStake = parseInt(document.getElementById('baseStake').value) || 100;
        const stakeEl = document.getElementById("stakeAdv");
        let betAmount = 0;
        
        if (stars === 5) { 
            betAmount = baseStake * 3; 
            stakeEl.innerText = `💰 重注鎖定 ($${betAmount})`; 
            stakeEl.className = "stake-adv stake-high"; 
            playSound('heavyStake');
        }
        else if (stars === 4) { 
            betAmount = baseStake * 2; 
            stakeEl.innerText = `🔥 中注跟進 ($${betAmount})`; 
            stakeEl.className = "stake-adv"; stakeEl.style.color = "var(--warning)"; 
        }
        else if (stars === 3) { 
            betAmount = baseStake * 1; 
            stakeEl.innerText = `🛡️ 輕注試水 ($${betAmount})`; 
            stakeEl.className = "stake-adv"; stakeEl.style.color = "var(--success)"; 
        }
        else { 
            betAmount = 0; 
            stakeEl.innerText = "💤 觀望休息 ($0)"; 
            stakeEl.className = "stake-adv"; stakeEl.style.color = "#94a3b8"; 
        }
        
        this.data.currentBetAmount = betAmount; 
    },

    refreshUI() {
        const rounds = this.data.rounds; const total = rounds.length; if(total === 0) return;
        const tP = this.data.predsTrend[total-1]; const aP = this.data.predsAggr[total-1];
        document.getElementById("nextTrend").innerText = tP; document.getElementById("nextTrend").className = `pred-box ${tP === '大' ? 'big' : 'small'}`;
        document.getElementById("nextAggr").innerText = aP; document.getElementById("nextAggr").className = `pred-box ${aP === '大' ? 'big' : 'small'}`;
        
        let win20Trend = 0, win100Trend = 0, htmlTrend = "";
        let win20Aggr = 0, win100Aggr = 0, htmlAggr = "";
        let win10Aggr = 0; 
        
        for(let i = 1; i < total; i++) {
            const isWinTrend = this.data.predsTrend[i-1] === rounds[i].size;
            const isWinAggr = this.data.predsAggr[i-1] === rounds[i].size;
            
            if(i >= total - 20) { if(isWinTrend) win20Trend++; htmlTrend = `<div class="dot ${isWinTrend?'win':'lose'}"></div>` + htmlTrend; }
            if(i >= total - 100 && isWinTrend) win100Trend++;
            
            if(i >= total - 20) { if(isWinAggr) win20Aggr++; htmlAggr = `<div class="dot ${isWinAggr?'win':'lose'}"></div>` + htmlAggr; }
            if(i >= total - 100 && isWinAggr) win100Aggr++;
            if(i >= total - 10 && isWinAggr) win10Aggr++;
        }
        
        document.getElementById('accTrend20').innerText = (win20Trend / Math.min(total-1, 20) * 100).toFixed(1) + "%";
        document.getElementById('accTrend100').innerText = (win100Trend / Math.min(total-1, 100) * 100).toFixed(1) + "%";
        document.getElementById('dotsTrend').innerHTML = htmlTrend;

        document.getElementById('accAggr20').innerText = (win20Aggr / Math.min(total-1, 20) * 100).toFixed(1) + "%";
        document.getElementById('accAggr100').innerText = (win100Aggr / Math.min(total-1, 100) * 100).toFixed(1) + "%";
        document.getElementById('dotsAggr').innerHTML = htmlAggr;

        const volRate = total > 1 ? Math.round((win10Aggr / Math.min(total-1, 10)) * 100) : 50;
        const volFillEl = document.getElementById("volatilityFill");
        const volTextEl = document.getElementById("volatilityText");
        
        volFillEl.style.width = volRate + "%";
        if (volRate >= 50) {
            volFillEl.style.background = "var(--danger)"; 
            volTextEl.innerText = `🔴 紅筆/路齊 (${volRate}%)`;
            volTextEl.style.color = "var(--danger)";
        } else {
            volFillEl.style.background = "var(--primary)"; 
            volTextEl.innerText = `🔵 藍筆/路亂 (${volRate}%)`;
            volTextEl.style.color = "var(--primary)";
        }

        document.getElementById("historyList").innerHTML = rounds.slice(-25).reverse().map(r => 
            `<span class="history-tag ${r.size==='大'?'tag-big':'tag-small'}">${r.dice.join("")} <b style="color:${r.size==='大'?'#f87171':'#38bdf8'}">${r.size}</b> ${r.isSpec?'⭐':''}</span>`
        ).join("");
        
        this.updateChart();
    },
    updateChart() {
        this.chart.setOption({
            grid: { top: 30, bottom: 30, left: 40, right: 20 },
            xAxis: { data: this.data.probs.map((_, i) => i + 1) },
            yAxis: { min: 0, max: 20 },
            series: [{ data: this.data.probs, type: 'line', smooth: true, color: '#ff00ea' }]
        });
    },
    
    deleteLast() { 
        if(this.data.rounds.length === 0) return; 
        const lastRound = this.data.rounds.pop(); 
        this.data.probs.pop(); 
        this.data.predsTrend.pop(); 
        this.data.predsAggr.pop(); 
        
        if (document.getElementById('autoSimToggle').checked && lastRound.betAmount > 0) {
            if (lastRound.isWin) this.data.bankroll -= lastRound.betAmount; 
            else this.data.bankroll += lastRound.betAmount; 
            document.getElementById('currentBankroll').innerText = Math.floor(this.data.bankroll);
        }
        this.calculate(); 
    }
};

app.init();
</script>
</body>
</html>
