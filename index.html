<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九骰旗艦系統 v6.5 實戰修正版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #facc15;
            --hot: #f97316; --ultra: #ff00ea;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; margin-top: 12px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        .dice-btn { width: 44px; height: 44px; font-size: 20px; margin: 3px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; cursor: pointer; }
        .prob { font-size: 38px; font-weight: 800; font-family: 'Courier New'; color: white; }
        .ratio-box { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; }
        .ratio-bar { flex-grow: 1; height: 12px; background: var(--primary); border-radius: 6px; overflow: hidden; display: flex; flex-direction: row-reverse; }
        .ratio-fill { height: 100%; background: var(--danger); transition: 0.5s; }
        .stake-adv { font-size: 18px; font-weight: bold; padding: 8px 20px; border-radius: 20px; margin-top: 10px; display: inline-block; border: 2px solid transparent; min-width: 150px; }
        .stake-wait { color: #94a3b8; border-color: #475569; }
        .stake-low { color: var(--success); border-color: var(--success); }
        .stake-mid { color: var(--warning); border-color: var(--warning); box-shadow: 0 0 10px rgba(250, 204, 21, 0.3); }
        .stake-high { color: var(--ultra); border-color: var(--ultra); animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; text-shadow: 0 0 10px var(--ultra); } to { opacity: 0.5; } }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #334155; }
        .pred-box { font-size: 24px; font-weight: bold; border-radius: 6px; padding: 5px 10px; }
        .big { color: var(--danger); background: rgba(239, 68, 68, 0.15); }
        .small { color: var(--primary); background: rgba(59, 130, 246, 0.15); }
        .dot-container { display: flex; flex-wrap: wrap; gap: 4px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.win { background: var(--success); box-shadow: 0 0 6px var(--success); }
        .dot.lose { background: var(--danger); }
        .history-tag { display: inline-block; background: #334155; padding: 4px 10px; border-radius: 6px; margin: 4px; font-size: 14px; border-left: 5px solid transparent; }
    </style>
</head>
<body>

<div class="container">
    <header><h2>🎲 九骰旗艦 v6.5 <span style="font-size: 12px; color:var(--success)">● 1-2 規律深度修正版</span></h2></header>

    <div class="card">
        <div id="diceButtons"></div>
        <div style="margin-top:10px;">
            選取：<span id="selectedDice" style="color:var(--warning); font-weight:bold; font-size:20px;">-</span> 
            <button onclick="app.submitRound()" style="background:var(--success); color:white; border:none; padding:10px 30px; border-radius:8px; cursor:pointer; font-weight:bold; margin-left:20px;">確認送出</button>
            <button onclick="app.deleteLast()" style="background:#475569; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; margin-left:10px;">撤銷</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>⚠️ 監控核心</h3>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div id="specialProb" class="prob">0.00%</div>
                    <div id="patternStatus" style="color:var(--warning); font-size:13px; font-weight:bold;">等待啟動...</div>
                </div>
                <div style="text-align: right; width: 55%;">
                    <div style="font-size: 12px; color:#94a3b8; margin-bottom: 5px;">大小佔比 (近50局)</div>
                    <div class="ratio-box">
                        <span style="font-size:13px; color:var(--primary); font-weight:bold;">小</span>
                        <div class="ratio-bar"><div id="ratioFill" class="ratio-fill" style="width: 50%;"></div></div>
                        <span style="font-size:13px; color:var(--danger); font-weight:bold;">大</span>
                    </div>
                    <div id="ratioText" style="font-size:13px; color:white; font-weight:bold; margin-top:5px;">50% : 50%</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>📊 戰術預測</h3>
            <table>
                <tr><th>模式</th><th>下一局</th><th>20局</th><th>100局</th></tr>
                <tr>
                    <td>🌐 趨勢</td>
                    <td id="nextTrend" class="pred-box">-</td>
                    <td id="accTrend20" style="color:var(--success)">-</td>
                    <td id="accTrend100">-</td>
                </tr>
                <tr>
                    <td>🔥 規律</td>
                    <td id="nextAggr" class="pred-box">-</td>
                    <td id="accAggr20" style="color:var(--success)">-</td>
                    <td id="accAggr100">-</td>
                </tr>
            </table>
            <div style="text-align: center;">
                <div id="confStars" style="color:var(--warning); margin-top:10px; font-size:18px;"></div>
                <div id="stakeAdv" class="stake-adv stake-wait">等待輸入數據</div>
            </div>
        </div>

        <div class="card">
            <h3>📈 燈號紀錄</h3>
            <div id="roadAdvice" style="background:#020617; padding:12px; border-radius:8px; color:#10b981; font-family:monospace; margin-bottom:10px; border-left:4px solid var(--success);">請輸入數據...</div>
            <div style="display:flex; flex-direction:column; gap:12px;">
                <div style="display:flex; align-items:center; gap:10px;"><span style="width:50px; font-size:12px; color:#94a3b8;">🌐 趨勢</span><div id="dotsTrend" class="dot-container"></div></div>
                <div style="display:flex; align-items:center; gap:10px;"><span style="width:50px; font-size:12px; color:#94a3b8;">🔥 規律</span><div id="dotsAggr" class="dot-container"></div></div>
            </div>
        </div>
    </div>

    <div class="card"><div id="chart" style="height:180px;"></div></div>
    <div class="card"><div id="historyList"></div></div>
</div>

<script>
const app = {
    data: { rounds: [], selected: [], probs: [], predsTrend: [], predsAggr: [], intervals: [], lastSpecial: null },
    init() { this.renderBtns(); this.chart = echarts.init(document.getElementById('chart')); this.updateChart(); },
    renderBtns() {
        const c = document.getElementById("diceButtons");
        for(let i=1; i<=6; i++) {
            const b = document.createElement("button"); b.innerText = i; b.className = "dice-btn";
            b.onclick = () => { if(this.data.selected.length < 3) { this.data.selected.push(i); document.getElementById("selectedDice").innerText = this.data.selected.join(","); } };
            c.appendChild(b);
        }
    },
    submitRound() {
        if(this.data.selected.length !== 3) return;
        const dice = [...this.data.selected]; const sum = dice.reduce((a,b)=>a+b,0);
        const isSpec = (dice[0]===dice[1] && dice[1]===dice[2]) || sum === 17;
        this.data.rounds.push({ dice, sum, isSpec, size: sum >= 11 ? "大" : "小" });
        if(isSpec) {
            if(this.data.lastSpecial !== null) this.data.intervals.push(this.data.rounds.length - 1 - this.data.lastSpecial);
            this.data.lastSpecial = this.data.rounds.length - 1;
        }
        this.data.selected = []; document.getElementById("selectedDice").innerText = "-"; this.calculate();
    },
    calculate() { 
        this.calcSpecialProb(); 
        this.analyzeTrend(); 
        this.analyzeAggr(); 
        this.refreshUI(); 
    },

    calcSpecialProb() {
        const rounds = this.data.rounds; const total = rounds.length;
        const gap = this.data.lastSpecial === null ? total : total - 1 - this.data.lastSpecial;
        let weight = 1.0; weight += Math.exp(-Math.pow(gap - 8, 2) / 10); if(gap > 15) weight += (gap-15)*0.1;
        const finalProb = Math.min(4.17 * weight, 20.0);
        this.data.probs.push(finalProb.toFixed(2));
        document.getElementById("specialProb").innerText = finalProb.toFixed(2) + "%";
        document.getElementById("specialProb").className = "prob" + (finalProb >= 15 ? " level-ultra" : "");
        
        const last50 = rounds.slice(-50);
        const bigCount = last50.filter(r => r.size === "大").length;
        const bigRate = last50.length === 0 ? 50 : Math.round((bigCount / last50.length) * 100);
        document.getElementById("ratioFill").style.width = bigRate + "%";
        document.getElementById("ratioText").innerText = `${100-bigRate}% (小) : ${bigRate}% (大)`;
    },

    analyzeTrend() {
        const rounds = this.data.rounds; const total = rounds.length; if(total === 0) return;
        const last20 = rounds.slice(-20).map(r => r.size);
        const bigRate = last20.filter(s => s === "大").length / last20.length;
        let pred = rounds[total-1].size;
        if (bigRate >= 0.60) pred = "小"; 
        else if (bigRate <= 0.40) pred = "大"; 
        this.data.predsTrend.push(pred);
    },

    analyzeAggr() {
        const rounds = this.data.rounds; const total = rounds.length; if(total === 0) return;
        const sizes = rounds.map(r => r.size); const last = sizes[total-1];
        let nextAggr = last; let msg = "掃描路單中..."; let stars = 2;
        const s = sizes.slice(-12).join("");
        let streak = 0; for(let i=total-1; i>=0; i--) { if(sizes[i] === last) streak++; else break; }

        // --- 1-2 規律深度判定修復 ---
        const is12Sequence = s.endsWith("大小大大小") || s.endsWith("小大小小大"); // 正處於 1-2 的補位點
        const is12FullCycle = s.endsWith("大小小") || s.endsWith("小大大"); // 剛完成一組 1-2
        const is12Continuous = s.endsWith("大小小大小小") || s.endsWith("小大大小大大"); // 連續兩組 1-2

        if (is12Sequence) {
            nextAggr = (last === "大" ? "大" : "小"); // 補完 1-2 的最後一個
            msg = "【1-2 規律】補位點鎖定"; stars = 5;
        } else if (is12Continuous) {
            nextAggr = (last === "大" ? "小" : "大"); // 連續 1-2 後的變點
            msg = "【1-2 連續】規律極強"; stars = 5;
        } else if (is12FullCycle) {
            nextAggr = (last === "大" ? "小" : "大"); // 剛完結，準備切換
            msg = "【1-2 完結】預期換向"; stars = 4;
        } else if (s.endsWith("大小大小") || s.endsWith("小大小大")) {
            nextAggr = (last === "大" ? "小" : "大"); 
            msg = "【單跳】規律持續"; stars = 4;
        } else if (streak >= 3) {
            nextAggr = streak >= 6 ? (last === "大" ? "小" : "大") : last;
            msg = streak >= 6 ? "【長龍】警示切換" : "【長龍】順勢跟隨"; stars = 4;
        } else {
            nextAggr = last; stars = 2;
        }

        this.data.predsAggr.push(nextAggr);
        document.getElementById("roadAdvice").innerText = msg;
        document.getElementById("confStars").innerText = "⭐".repeat(stars);

        // --- 注碼提示邏輯修正 ---
        const stakeEl = document.getElementById("stakeAdv");
        const lastWinAggr = this.data.predsAggr.length > 1 && this.data.predsAggr[total-2] === rounds[total-1].size;
        
        stakeEl.className = "stake-adv";
        if (stars === 5) { 
            stakeEl.innerText = "💰 重注鎖定"; stakeEl.classList.add("stake-high"); 
        } else if (stars === 4) { 
            stakeEl.innerText = "🔥 中注跟進"; stakeEl.classList.add("stake-mid"); 
        } else if (stars === 3 || lastWinAggr) {
            stakeEl.innerText = "🛡️ 輕注觀望"; stakeEl.classList.add("stake-low");
        } else {
            stakeEl.innerText = "💤 等待規律"; stakeEl.classList.add("stake-wait");
        }
    },

    refreshUI() {
        const rounds = this.data.rounds; const total = rounds.length; if(total === 0) return;
        const tP = this.data.predsTrend[total-1], aP = this.data.predsAggr[total-1];
        document.getElementById("nextTrend").innerText = tP; document.getElementById("nextTrend").className = `pred-box ${tP === '大' ? 'big' : 'small'}`;
        document.getElementById("nextAggr").innerText = aP; document.getElementById("nextAggr").className = `pred-box ${aP === '大' ? 'big' : 'small'}`;
        
        const renderDots = (dotId, predArr) => {
            let win20 = 0, win100 = 0, html = "";
            for(let i = 1; i < total; i++) {
                const isWin = predArr[i-1] === rounds[i].size;
                if(i >= total - 20 && isWin) win20++;
                if(i >= total - 100 && isWin) win100++;
                if(i >= total - 20) html = `<div class="dot ${isWin?'win':'lose'}"></div>` + html;
            }
            const prefix = dotId === "dotsTrend" ? "Trend" : "Aggr";
            document.getElementById(`acc${prefix}20`).innerText = (win20 / Math.min(total-1, 20) * 100).toFixed(1) + "%";
            document.getElementById(`acc${prefix}100`).innerText = (win100 / Math.min(total-1, 100) * 100).toFixed(1) + "%";
            document.getElementById(dotId).innerHTML = html;
        };
        renderDots("dotsTrend", this.data.predsTrend);
        renderDots("dotsAggr", this.data.predsAggr);
        
        document.getElementById("historyList").innerHTML = rounds.slice(-25).reverse().map(r => 
            `<span class="history-tag ${r.size==='大'?'tag-big':'tag-small'}">${r.dice.join("")} <b style="color:${r.size==='大'?'#f87171':'#38bdf8'}">${r.size}</b> ${r.isSpec?'⭐':''}</span>`
        ).join("");
        this.updateChart();
    },
    updateChart() {
        this.chart.setOption({
            xAxis: { data: this.data.probs.map((_, i) => i + 1) },
            yAxis: { max: 20 },
            series: [{ data: this.data.probs, type: 'line', smooth: true }]
        });
    },
    deleteLast() { if(this.data.rounds.length === 0) return; this.data.rounds.pop(); this.data.probs.pop(); this.data.predsTrend.pop(); this.data.predsAggr.pop(); this.calculate(); }
};
app.init();
</script>
</body>
</html>
