<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九骰核心系統 v4.7 強化路單版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9;
            --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; --warning: #facc15;
            --ultra-hot: #ff00ea;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1300px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { background: var(--card); padding: 18px; border-radius: 12px; border: 1px solid #334155; }
        
        /* 骰子與數值 */
        .dice-btn { width: 45px; height: 45px; font-size: 18px; margin: 3px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; cursor: pointer; }
        .prob { font-size: 42px; font-weight: 800; font-family: 'Courier New'; margin: 5px 0; }
        .ultra-hot-blink { color: var(--ultra-hot); animation: blink 0.5s infinite alternate; text-shadow: 0 0 15px var(--ultra-hot); }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }

        /* 勝率與預測表 */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #334155; }
        .pred-box { font-size: 20px; font-weight: bold; padding: 5px; border-radius: 4px; }
        .big { color: var(--danger); }
        .small { color: var(--primary); }

        .road-msg { background: #020617; padding: 12px; border-radius: 8px; color: #10b981; font-family: monospace; font-size: 14px; min-height: 45px; line-height: 1.5; }
        .history-tag { display: inline-block; background: #334155; padding: 2px 6px; border-radius: 4px; margin: 2px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🎲 九骰核心系統 v4.7 <span style="font-size: 12px; color:var(--success)">多路單特徵識別</span></h2>
    </header>

    <div class="card">
        <div id="diceButtons"></div>
        <div style="margin-top:10px;">待確認：<span id="selectedDice" style="color:var(--warning)">-</span></div>
        <div style="margin-top:10px;">
            <button onclick="app.submitRound()" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">確認送出</button>
            <button onclick="app.deleteLast()" style="background:#475569; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer; margin-left:10px;">撤銷一步</button>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>⚠️ 豹子機率監控</h3>
            <div id="specialProb" class="prob">0.00%</div>
            <div id="patternStatus" style="color:var(--warning); font-weight:bold; height:22px; font-size:14px;"></div>
            <p id="gapInfo" style="font-size:13px; color:#94a3b8; margin-top:10px;"></p>
        </div>

        <div class="card">
            <h3>📊 雙模式預測與勝率</h3>
            <table>
                <tr>
                    <th>模式</th>
                    <th>下一局預測</th>
                    <th>近 20 局</th>
                    <th>近 100 局</th>
                </tr>
                <tr>
                    <td>🛡️ 保守</td>
                    <td id="nextCons" class="pred-box">-</td>
                    <td id="accCons20" style="color:var(--success)">-</td>
                    <td id="accCons100">-</td>
                </tr>
                <tr>
                    <td>🔥 高頻</td>
                    <td id="nextAggr" class="pred-box">-</td>
                    <td id="accAggr20" style="color:var(--success)">-</td>
                    <td id="accAggr100">-</td>
                </tr>
            </table>
        </div>

        <div class="card">
            <h3>📈 實時趨勢路單分析</h3>
            <div id="roadAdvice" class="road-msg">等待數據輸入...</div>
        </div>
    </div>

    <div class="card">
        <h3>機率走勢 (趨勢修正版 18% Max)</h3>
        <div id="chart" style="height:250px;"></div>
    </div>

    <div class="card">
        <h3>歷史記錄 (近 30 局)</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
const app = {
    data: {
        rounds: [],
        selected: [],
        probs: [],
        predsCons: [], // 存儲每一局「預測下一局」的結果
        predsAggr: [],
        intervals: [],
        lastSpecial: null
    },

    init() {
        this.renderBtns();
        this.chart = echarts.init(document.getElementById('chart'));
        this.updateChart();
    },

    renderBtns() {
        const c = document.getElementById("diceButtons");
        for(let i=1; i<=6; i++) {
            const b = document.createElement("button");
            b.innerText = i; b.className = "dice-btn";
            b.onclick = () => {
                if(this.data.selected.length < 3) {
                    this.data.selected.push(i);
                    document.getElementById("selectedDice").innerText = this.data.selected.join(",");
                }
            };
            c.appendChild(b);
        }
    },

    submitRound() {
        if(this.data.selected.length !== 3) return;
        const dice = [...this.data.selected];
        const sum = dice.reduce((a,b)=>a+b,0);
        const isSpec = (dice[0]===dice[1] && dice[1]===dice[2]) || sum === 17;

        const roundData = { dice, sum, isSpec, size: sum >= 11 ? "大" : "小" };
        this.data.rounds.push(roundData);
        
        if(isSpec) {
            if(this.data.lastSpecial !== null) this.data.intervals.push(this.data.rounds.length - 1 - this.data.lastSpecial);
            this.data.lastSpecial = this.data.rounds.length - 1;
        }

        this.data.selected = [];
        document.getElementById("selectedDice").innerText = "-";
        this.calculate();
    },

    calculate() {
        this.calcSpecialProb();
        this.analyzeRoads();
        this.refreshUI();
    },

    calcSpecialProb() {
        const rounds = this.data.rounds;
        const total = rounds.length;
        const gap = this.data.lastSpecial === null ? total : total - 1 - this.data.lastSpecial;
        
        let weight = 1.0;
        weight += Math.exp(-Math.pow(gap - 8, 2) / 10); 
        if(gap > 15) weight += (gap-15)*0.1;

        // 九骰特徵識別
        let patternBonus = 1.0;
        let patternDesc = "";
        if(total >= 3) {
            const all9 = rounds.slice(-3).flatMap(r => r.dice);
            const counts = {};
            all9.forEach(n => counts[n] = (counts[n] || 0) + 1);
            const freq = Object.values(counts).sort((a,b)=>b-a);
            if(freq[0]>=4 && freq[1]>=4) { patternBonus = 2.5; patternDesc = "🔥 特徵：4同+4同 (極熱)"; }
            else if(freq[0]>=3 && freq[1]>=3 && freq[2]>=3) { patternBonus = 2.2; patternDesc = "🔥 特徵：3同+3同+3同"; }
            else if(freq[0]>=3 && freq[1]>=3) { patternBonus = 1.6; patternDesc = "⭐ 特徵：雙暗刻組合"; }
        }

        const finalProb = Math.min(4.17 * weight * patternBonus, 25.0);
        this.data.probs.push(finalProb.toFixed(2));
        
        const el = document.getElementById("specialProb");
        el.innerText = finalProb.toFixed(2) + "%";
        el.className = "prob " + (patternBonus > 1.5 ? "ultra-hot-blink" : "");
        document.getElementById("patternStatus").innerText = patternDesc;
        document.getElementById("gapInfo").innerText = `當前間隔：${gap} | 歷史：${[...this.data.intervals].reverse().slice(0,5).join(",")}`;
    },

    analyzeRoads() {
        const rounds = this.data.rounds;
        const total = rounds.length;
        if(total === 0) return;

        const sizes = rounds.map(r => r.size);
        const last = sizes[total-1];

        // --- 預測下一局邏輯 ---
        // 🛡️ 保守模式：跟隨最後一局（跟龍、跟趨勢）
        const nextCons = last;
        
        // 🔥 高頻模式：偵測多種路單特徵
        let nextAggr = last;
        let roadMsg = "穩定觀測中...";
        
        const last6 = sizes.slice(-6).join("");
        const last4 = sizes.slice(-4).join("");

        // 1. 偵測長龍 (連續 3 個以上)
        let streak = 0;
        for(let i=total-1; i>=0; i--) { if(sizes[i] === last) streak++; else break; }
        
        if(streak >= 3) {
            roadMsg = `【長龍】已連 ${streak} 局 ${last}，建議繼續跟！`;
            nextAggr = (streak >= 5) ? (last === '大' ? '小' : '大') : last; // 龍太長就準備反轉
        } 
        // 2. 單跳 (大小大小 或 小大小大)
        else if (last4 === "大小大小" || last4 === "小大小大") {
            roadMsg = "【單跳】大小交替中，建議反投！";
            nextAggr = (last === '大' ? '小' : '大');
        }
        // 3. 一跳二 (大小小大小小 或 小大大小大大)
        else if (last6.endsWith("大小小大小小") || last6.endsWith("小大大小大大")) {
            roadMsg = "【一跳二】規律偵測，預測下一局：大";
            nextAggr = last6.endsWith("大小小") ? "大" : "小";
        }
        // 4. 三三路 (大大大小小小)
        else if (last6 === "大大大小小小" || last6 === "小小小大大大") {
            roadMsg = "【三三路】對稱規律，建議反轉方向！";
            nextAggr = (last === '大' ? '小' : '大');
        }

        this.data.predsCons.push(nextCons);
        this.data.predsAggr.push(nextAggr);
        document.getElementById("roadAdvice").innerText = roadMsg;
    },

    refreshUI() {
        const rounds = this.data.rounds;
        const total = rounds.length;
        if(total === 0) return;

        // 顯示下一局預測
        const cP = this.data.predsCons[total-1];
        const aP = this.data.predsAggr[total-1];
        document.getElementById("nextCons").innerText = cP;
        document.getElementById("nextCons").className = `pred-box ${cP === '大' ? 'big' : 'small'}`;
        document.getElementById("nextAggr").innerText = aP;
        document.getElementById("nextAggr").className = `pred-box ${aP === '大' ? 'big' : 'small'}`;

        // 勝率統計 (統計的是「上一局的預測」是否等於「這一局的結果」)
        const calcAcc = (predArr, limit) => {
            let win = 0, count = 0;
            const start = Math.max(1, total - limit);
            for(let i = start; i < total; i++) {
                if(predArr[i-1] === rounds[i].size) win++;
                count++;
            }
            return count === 0 ? "-" : (win/count*100).toFixed(1) + "%";
        };

        document.getElementById("accCons20").innerText = calcAcc(this.data.predsCons, 20);
        document.getElementById("accCons100").innerText = calcAcc(this.data.predsCons, 100);
        document.getElementById("accAggr20").innerText = calcAcc(this.data.predsAggr, 20);
        document.getElementById("accAggr100").innerText = calcAcc(this.data.predsAggr, 100);

        // 歷史列表
        document.getElementById("historyList").innerHTML = rounds.slice(-30).reverse().map(r => `
            <span class="history-tag">${r.dice.join("")} <b style="color:${r.size==='大'?'#f87171':'#38bdf8'}">${r.size}</b> ${r.isSpec?'⭐':''}</span>
        `).join("");

        this.updateChart();
    },

    updateChart() {
        this.chart.setOption({
            xAxis: { data: this.data.probs.map((_,i)=>i+1) },
            yAxis: { max: 18 }, // 修正上限為 18%，更符合 4~15% 的波動觀察
            series: [{ data: this.data.probs, type: 'line', smooth: true, color: '#3b82f6', areaStyle: { opacity: 0.1 } }]
        });
    },

    deleteLast() {
        if(this.data.rounds.length === 0) return;
        this.data.rounds.pop();
        this.data.probs.pop();
        this.data.predsCons.pop();
        this.data.predsAggr.pop();
        this.calculate();
    }
};

app.init();
</script>
</body>
</html>
